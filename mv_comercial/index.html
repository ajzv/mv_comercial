<html lang="es">

<head>

    <!-- Favicon -->
    <link rel="icon"

    <title>MV Comercial - Calidad y Frescura Siempre</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Roboto+Mono:wght@400;700&display=swap"
        rel="stylesheet">

    <style>
        /* VARIABLES Y RESET */
        :root {
            --primary: #00ff88;
            --primary-glow: rgba(0, 255, 136, 0.3);
            --bg-dark: #0b0e11;
            --surface: #15191d;
            --surface-hover: #1c2227;
            --text-main: #e0e0e0;
            --text-dim: #94a3b8;
            --accent: #ffcc00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
            position: relative;
        }

        /* Resplandores flotantes estilo Aurora Ambiental */
        body::before {
            content: "";
            position: fixed;
            top: -20vh;
            left: -10vw;
            width: 70vw;
            height: 70vh;
            background: radial-gradient(circle, rgba(0, 255, 136, 0.045) 0%, transparent 60%);
            z-index: -1;
            pointer-events: none;
            animation: floatOrb 20s infinite alternate ease-in-out;
        }

        body::after {
            content: "";
            position: fixed;
            bottom: -20vh;
            right: -10vw;
            width: 80vw;
            height: 80vh;
            background: radial-gradient(circle, rgba(0, 255, 136, 0.035) 0%, transparent 60%);
            z-index: -1;
            pointer-events: none;
            animation: floatOrb2 25s infinite alternate ease-in-out;
        }

        /* --- ANIMACIONES --- */
        @keyframes floatOrb {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(10vw, 15vh) scale(1.1);
            }
        }

        @keyframes floatOrb2 {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(-10vw, -15vh) scale(1.1);
            }
        }


        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .product-appear {
            animation: fadeInUp 0.5s ease forwards;
        }

        /* HEADER Y BANNER */
        header {
            background: rgba(11, 14, 17, 0.9);
            backdrop-filter: blur(15px);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(0, 255, 136, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .banner-container {
            width: 100%;
            background: var(--bg-dark);
            position: relative;
            overflow: hidden;
        }

        .banner-container::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, transparent 0%, var(--bg-dark) 95%);
        }

        .header-img {
            width: 100%;
            height: auto;
            max-height: 400px;
            /* Altura máxima ajustada para banner ancho */
            object-fit: cover;
            /* Cubre todo el ancho */
            border-radius: 0;
            /* Sin bordes redondeados para ancho completo */
            background: transparent;
            padding: 0;
            box-shadow: none;

            /* APLICACIÓN DE LA ANIMACIÓN DE CARGA */
            animation: fadeInDown 1s ease-out;
            will-change: transform, opacity;
            /* Optimización de rendimiento */
        }

        /* NAVEGACIÓN */
        nav {
            display: flex;
            gap: 10px;
            justify-content: center;
            overflow-x: auto;
            padding: 5px 15px;
        }

        nav::-webkit-scrollbar {
            display: none;
        }

        /* Oculta scrollbar en nav */

        nav button {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 255, 136, 0.2);
            color: var(--text-dim);
            padding: 8px 18px;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
            font-size: 14px;
        }

        nav button:hover,
        nav button.active {
            background: var(--primary-glow);
            color: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
            transform: translateY(-2px);
        }

        /* CONTENEDOR PRINCIPAL */
        .container {
            max-width: 1200px;
            margin: 30px auto;
            display: flex;
            gap: 25px;
            padding: 0 20px;
        }

        .products {
            flex: 3;
        }

        /* BUSCADOR */
        .search {
            display: flex;
            margin-bottom: 25px;
            background: var(--surface);
            border-radius: 50px;
            padding: 5px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.02);
            color: var(--text-main);
            outline: none;
            font-size: 15px;
            transition: 0.3s;
        }

        input:focus,
        textarea:focus,
        select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px var(--primary-glow);
            background: rgba(255, 255, 255, 0.05);
        }

        .btn-order {
            width: 100%;
            background: var(--primary);
            color: #000;
            border: none;
            padding: 16px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        .btn-order:hover {
            box-shadow: 0 0 30px var(--primary-glow);
            transform: scale(1.02);
        }

        .search input {
            flex: 1;
            padding: 12px 20px;
            border: none;
            outline: none;
            background: transparent;
            color: var(--text-main);
        }

        .search button {
            padding: 10px 25px;
            border: none;
            background: var(--primary);
            color: #000;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .search button:hover {
            background: var(--primary-light);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        /* PRODUCTOS GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 25px;
            padding: 20px 0;
        }

        .product {
            background: var(--surface);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.4s ease;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .product:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.15);
        }

        .product img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            transition: transform 0.6s ease;
            filter: brightness(0.9);
        }

        .product:hover img {
            transform: scale(1.1);
            filter: brightness(1.1);
        }

        .product-content {
            padding: 15px;
            text-align: center;
        }

        .product h3 {
            font-size: 1.1rem;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .price {
            font-family: 'Roboto Mono', monospace;
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
            margin: 5px 0;
        }

        .old-price {
            font-family: 'Roboto Mono', monospace;
            text-decoration: line-through;
            color: #666;
            font-size: 14px;
        }

        .stock {
            font-size: 13px;
            color: var(--text-dim);
            margin-bottom: 15px;
        }

        .product-content button {
            width: 100%;
            background: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
        }

        .product-content button:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 20px var(--primary-glow);
        }

        /* CARRITO */
        .cart {
            flex: 1;
            background: var(--surface);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid rgba(0, 255, 136, 0.1);
            position: sticky;
            top: 100px;
            height: fit-content;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }

        .cart h2 {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 22px;
            margin-bottom: 25px;
            color: var(--primary);
            border-bottom: 1px solid rgba(0, 255, 136, 0.1);
            padding-bottom: 15px;
        }

        .cart-item {
            padding: 15px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .cart-item b {
            color: var(--text-main);
        }

        .cart-item input {
            width: 60px;
            padding: 6px;
            margin: 5px 0;
            border-radius: 6px;
            border: 1px solid #ddd;
        }

        .total {
            font-size: 1.2rem;
            padding: 15px 0;
            color: var(--primary);
            border-top: 2px solid #f0f0f0;
            font-weight: bold;
        }

        .cart input[type="text"],
        .cart textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        .cart textarea {
            resize: none;
            height: 80px;
        }

        .cart button.btn-order {
            background: var(--primary);
            color: white;
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .cart button.btn-order:hover {
            background: var(--primary-light);
        }

        /* BOTÓN FLOTANTE */
        .floating-whatsapp {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--surface);
            color: var(--primary);
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            box-shadow: 0 0 20px var(--primary-glow);
            /* Updated shadow */
            border: 1px solid var(--primary);
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
        }

        .floating-whatsapp:hover {
            transform: scale(1.1) rotate(15deg);
            box-shadow: 0 0 40px var(--primary-glow);
            background: var(--primary);
            color: #000;
        }

        /* RESPONSIVE */
        @media(max-width:768px) {
            .container {
                flex-direction: column;
            }

            .header-img {
                max-height: 120px;
            }

            /* Más pequeño en móvil */
            .cart {
                position: relative;
                top: 0;
            }

            .mobile-nav {
                display: flex;
            }

            header {
                position: relative;
            }

            /* Evita que el contenido quede tapado por la barra móvil */
            body {
                padding-bottom: 70px;
            }
        }

        /* BARRA MÓVIL */
        .mobile-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(11, 14, 17, 0.95);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: space-around;
            padding: 12px 0;
            box-shadow: 0 -5px 30px rgba(0, 0, 0, 0.5);
            z-index: 2000;
            border-top: 1px solid rgba(0, 255, 136, 0.2);
        }

        .mobile-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
            cursor: pointer;
        }

        .mobile-nav-item span {
            font-size: 22px;
            margin-bottom: 4px;
            color: var(--primary);
        }

        .mobile-nav-item.active {
            color: var(--primary);
        }

        /* BOTÓN VACIAR */
        .btn-clear {
            font-size: 11px;
            background: transparent;
            color: #ff4757;
            border: 1px solid #ff4757;
            padding: 4px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-clear:hover {
            background: #ff4757;
            color: #fff;
            box-shadow: 0 0 15px rgba(255, 71, 87, 0.3);
        }

        /* BADGE CONTADOR MÓVIL */
        .mobile-cart-badge {
            position: absolute;
            top: -4px;
            right: -6px;
            background: var(--primary);
            color: #000;
            font-size: 9px;
            font-weight: 700;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            font-family: 'Roboto Mono', monospace;
        }

        .mobile-cart-icon {
            position: relative;
            display: inline-block;
        }

        /* SECCIÓN DESTACADOS */
        .featured-section {
            padding: 0 0 30px 0;
        }

        .featured-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 0.5px;
        }

        .featured-title::after {
            content: "";
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, rgba(0, 255, 136, 0.3), transparent);
        }

        .featured-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 10px;
        }

        .sort-container {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sort-container select {
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid rgba(0, 255, 136, 0.2);
            background: var(--surface);
            color: var(--text-main);
            outline: none;
            cursor: pointer;
            font-size: 13px;
        }

        /* MODAL CYBER-FRESH */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeInDown 0.2s ease;
        }

        .modal-box {
            background: var(--surface);
            border: 1px solid rgba(0, 255, 136, 0.2);
            border-radius: 16px;
            padding: 35px 40px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 0 60px rgba(0, 255, 136, 0.1);
            text-align: center;
        }

        .modal-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 10px;
        }

        .modal-msg {
            font-size: 14px;
            color: var(--text-dim);
            line-height: 1.7;
            margin-bottom: 25px;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .modal-btn {
            padding: 10px 28px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: 0.3s;
        }

        .modal-btn.primary {
            background: var(--primary);
            color: #000;
        }

        .modal-btn.primary:hover {
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .modal-btn.danger {
            background: #ff4757;
            color: #fff;
        }

        .modal-btn.danger:hover {
            box-shadow: 0 0 20px rgba(255, 71, 87, 0.3);
        }

        .modal-btn.secondary {
            background: transparent;
            color: var(--text-dim);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-btn.secondary:hover {
            background: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>

                    style="display: flex; flex-direction: column; align-items: center; color: var(--text-dim); font-size: 13px;">
                    <span style="font-size: 24px; color: var(--primary); margin-bottom: 5px;">📍</span>
                    <span>Asunción, Paraguay</span>
                </div>
                <div
                    style="display: flex; flex-direction: column; align-items: center; color: var(--text-dim); font-size: 13px;">
                    <span style="font-size: 24px; color: var(--primary); margin-bottom: 5px;">📞</span>
                    <span>+595 971 561 425</span>
                </div>
                <div
                    style="display: flex; flex-direction: column; align-items: center; color: var(--text-dim); font-size: 13px;">
                    <span style="font-size: 24px; color: var(--primary); margin-bottom: 5px;">⏰</span>
                    <span>Lun - Sab | 08:00 - 20:00</span>
                </div>
            </div>

            <p
                style="font-size: 12px; color: rgba(255,255,255,0.2); border-top: 1px solid rgba(255,255,255,0.05); padding-top: 25px; display: inline-block;">
                &copy; 2026 MV Comercial - Creado en Paraguay
            </p>
        </div>
    </footer>

    <script>
        // BASE DE DATOS DE PRODUCTOS (Fallback en caso de que falle el JSON)
        let productos = [
            { id: 1, nombre: "Manzana Kg", precio: 10000, stock: 20, categoria: "frutas", oferta: 8000, img: "https://images.unsplash.com/photo-1560806887-1e4cd0b6bcd6?w=400&q=80" },
            { id: 2, nombre: "Banana Kg", precio: 6000, stock: 30, categoria: "frutas", img: "https://images.unsplash.com/photo-1543218024-57a70143c369?w=400&q=80" },
            { id: 6, nombre: "Naranja Kg", precio: 5000, stock: 40, categoria: "frutas", img: "https://images.unsplash.com/photo-1582967788606-a171c1070db9?w=400&q=80" },
            { id: 7, nombre: "Piña Unidad", precio: 12000, stock: 15, categoria: "frutas", oferta: 10000, img: "https://images.unsplash.com/photo-1550258987-190a2d41a8ba?w=400&q=80" },
            { id: 8, nombre: "Uva Kg", precio: 18000, stock: 12, categoria: "frutas", img: "https://images.unsplash.com/photo-1596363505729-4190a9506133?w=400&q=80" },

            { id: 3, nombre: "Tomate Kg", precio: 7000, stock: 25, categoria: "verduras", oferta: 6000, img: "https://images.unsplash.com/photo-1518977822534-7049a61ee0c2?w=400&q=80" },
            { id: 10, nombre: "Cebolla Kg", precio: 4500, stock: 50, categoria: "verduras", img: "https://loremflickr.com/400/300/onion,food/all" },
            { id: 11, nombre: "Papa Kg", precio: 5500, stock: 60, categoria: "verduras", img: "https://images.unsplash.com/photo-1518977676601-b53f82aba655?w=400&q=80" },
            { id: 12, nombre: "Zanahoria Kg", precio: 4000, stock: 35, categoria: "verduras", img: "https://loremflickr.com/400/300/carrots,food/all" },
            { id: 13, nombre: "Locote Verde Kg", precio: 9000, stock: 15, categoria: "verduras", img: "https://loremflickr.com/400/300/greenpepper,food/all" },

            { id: 4, nombre: "Leche Entera", precio: 6500, stock: 24, categoria: "lacteos", img: "https://loremflickr.com/400/300/milk,glass/all" },
            { id: 14, nombre: "Queso Paraguay", precio: 35000, stock: 10, categoria: "lacteos", oferta: 32000, img: "https://loremflickr.com/400/300/cheese,food/all" },
            { id: 15, nombre: "Yogurt Frutilla", precio: 4500, stock: 40, categoria: "lacteos", img: "https://loremflickr.com/400/300/strawberry,yogurt/all" },
            { id: 16, nombre: "Manteca 200g", precio: 12000, stock: 18, categoria: "lacteos", img: "https://loremflickr.com/400/300/butter,food/all" },

            { id: 5, "nombre": "Gaseosa 2L", precio: 11000, stock: 30, categoria: "bebidas", img: "https://loremflickr.com/400/300/soda,bottle/all" },
            { id: 17, "nombre": "Jugo de Naranja 1L", precio: 8500, stock: 20, categoria: "bebidas", img: "https://loremflickr.com/400/300/orangejuice,glass/all" },
            { id: 18, "nombre": "Agua Mineral 500ml", precio: 3000, stock: 50, categoria: "bebidas", img: "https://loremflickr.com/400/300/waterbottle/all" },
            { id: 19, "nombre": "Cerveza Lata", precio: 7000, stock: 100, categoria: "bebidas", oferta: 6000, img: "https://loremflickr.com/400/300/beer,can/all" }
        ];

        let carrito = {};
        let categoriaActual = "";

        // INICIALIZACIÓN
        document.addEventListener("DOMContentLoaded", async () => {
            verificarHorario();

            try {
                const response = await fetch('productos.json');
                if (response.ok) {
                    productos = await response.json();
                } else {
                    console.warn("No se pudo cargar productos.json, usando catálogo por defecto.");
                }
            } catch (error) {
                console.warn("Fetch falló (probablemente entorno local file://), usando catálogo por defecto.", error);
                // Aquí usamos toast en vez de showAlert para no ser molestos
                setTimeout(() => {
                    let t = document.getElementById('toast');
                    t.innerText = "🌐 Modo Offline: Catálogo local cargado";
                    toast();
                }, 1000);
            }

            // Cargar carrito guardado desde LocalStorage
            const carritoGuardado = localStorage.getItem('mv_carrito');
            if (carritoGuardado) {
                const guardado = JSON.parse(carritoGuardado);
                // Re-sincronizar con el stock actual
                Object.values(guardado).forEach(item => {
                    const prod = productos.find(p => p.id === item.id);
                    if (prod && prod.stock >= item.cantidad) {
                        prod.stock -= item.cantidad;
                        carrito[item.id] = item;
                    }
                });
                renderCart();
            }
            renderFeatured();
            filtrarCategoria('');
        });

        // REVISIÓN DE HORARIO
        function verificarHorario() {
            const statusBanner = document.getElementById("store-status");
            const horaActual = new Date().getHours();

            // Horario: 08:00 a 20:00
            if (horaActual >= 8 && horaActual < 20) {
                statusBanner.style.background = "rgba(0, 255, 136, 0.1)";
                statusBanner.style.color = "var(--primary)";
                statusBanner.style.borderBottom = "1px solid rgba(0, 255, 136, 0.2)";
                statusBanner.innerHTML = "🟢 ABIERTO AHORA - ¡Recibiendo Pedidos!";
            } else {
                statusBanner.style.background = "rgba(255, 71, 87, 0.1)";
                statusBanner.style.color = "#ff4757";
                statusBanner.style.borderBottom = "1px solid rgba(255, 71, 87, 0.2)";
                statusBanner.innerHTML = "🔴 CERRADO AHORA - Puedes añadir al carrito y enviar para mañana";
            }
        }

        // SECCIÓN LO MÁS FRESCO
        function renderFeatured() {
            const destacados = productos.filter(p => p.oferta);
            const cont = document.getElementById('featured-grid');
            cont.innerHTML = '';
            destacados.forEach(p => {
                const precio = p.oferta || p.precio;
                cont.innerHTML += `
        <div class="product product-appear">
            <img src="${p.img}" alt="${p.nombre}" loading="lazy" decoding="async" width="400" height="180">
            <div class="product-content">
                <h3>${p.nombre}</h3>
                <div class="old-price">Gs ${p.precio.toLocaleString('es-PY')}</div>
                <div class="price">Gs ${precio.toLocaleString('es-PY')}</div>
                <div class="stock">Stock: ${p.stock}</div>
                <button onclick="agregar(${p.id})">Agregar al carrito</button>
            </div>
        </div>`;
            });
        }

        function mostrarProductos(lista = productos) {
            const cont = document.getElementById("products");
            cont.innerHTML = "";

            if (lista.length === 0) {
                cont.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 50px; color: #777; animation: fadeInDown 0.5s ease;">
                            <div style="font-size: 50px; margin-bottom: 15px;">🔍</div>
                            <h3>No se encontraron productos en esta categoría.</h3>
                            <p>Intenta con otra búsqueda o categoría.</p>
                          </div>`;
                return;
            }

            lista.forEach((p, index) => {
                let precio = p.oferta || p.precio;
                cont.innerHTML += `
        <div class="product product-appear" style="animation-delay: ${index * 0.05}s">
            <img src="${p.img}" alt="${p.nombre}" loading="lazy" decoding="async" width="400" height="180">
            <div class="product-content">
                <h3>${p.nombre}</h3>
                ${p.oferta ? `<div class="old-price">Gs ${p.precio}</div>` : ''}
                <div class="price">Gs ${precio.toLocaleString('es-PY')}</div>
                <div class="stock">Stock: ${p.stock}</div>
                <button onclick="agregar(${p.id})">Agregar al carrito</button>
            </div>
        </div>`;
            });
        }

        // FILTROS
        function filtrar() {
            let texto = document.getElementById("buscador").value.toLowerCase();
            let orden = document.getElementById("ordenar").value;

            let filtrados = productos.filter(p => {
                const coincideTexto = p.nombre.toLowerCase().includes(texto);
                const coincideCategoria = (categoriaActual === "" || p.categoria === categoriaActual || (categoriaActual === "ofertas" && p.oferta));
                return coincideTexto && coincideCategoria;
            });

            // Aplicar ordenamiento
            if (orden === "precio-asc") {
                filtrados.sort((a, b) => (a.oferta || a.precio) - (b.oferta || b.precio));
            } else if (orden === "precio-desc") {
                filtrados.sort((a, b) => (b.oferta || b.precio) - (a.oferta || a.precio));
            }

            mostrarProductos(filtrados);
        }

        // Utilidad para limpiar tildes y buscar bien el texto del botón
        const quitarTildes = (str) => str.normalize("NFD").replace(/[\u0300-\u036f]/g, "");

        function filtrarCategoria(cat) {
            categoriaActual = cat;

            // Gestionar clase activa en botones
            document.querySelectorAll('nav button').forEach(btn => {
                btn.classList.remove('active');
                const buscado = cat === '' ? 'inicio' : cat.toLowerCase();
                const textoBtn = quitarTildes(btn.innerText.toLowerCase());
                if (textoBtn.includes(buscado)) {
                    btn.classList.add('active');
                }
            });

            filtrar();

            // Desplazamiento automático hacia los productos
            if (cat !== '') {
                const searchSec = document.querySelector('.search');
                if (searchSec) {
                    searchSec.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            } else {
                window.scrollTo({ top: 0, behavior: 'smooth' }); // Subir al tope si es "Inicio"
            }
        }

        function mostrarOfertas() {
            categoriaActual = "ofertas"; // Estado especial

            // Marcar botón activo
            document.querySelectorAll('nav button').forEach(btn => {
                btn.classList.remove('active');
                if (quitarTildes(btn.innerText.toLowerCase()).includes('ofertas')) {
                    btn.classList.add('active');
                }
            });

            filtrar();

            // Desplazamiento automático
            const searchSec = document.querySelector('.search');
            if (searchSec) {
                searchSec.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        // LÓGICA DEL CARRITO
        function agregar(id) {
            let p = productos.find(x => x.id === id);
            if (p.stock <= 0) {
                showAlert('Sin Stock', '¡Lo sentimos! Este producto no tiene unidades disponibles por el momento.', '📦');
                return;
            }
            p.stock--;
            if (!carrito[id]) carrito[id] = { ...p, cantidad: 1 }; else carrito[id].cantidad++;
            renderCart();
            filtrar();
            toast();
        }

        function eliminar(id) {
            // Devuelve el stock al producto original
            let prodOriginal = productos.find(p => p.id === id);
            if (prodOriginal) prodOriginal.stock += carrito[id].cantidad;

            delete carrito[id];
            renderCart();
            filtrar();
        }

        function vaciarCarrito() {
            if (Object.keys(carrito).length === 0) return;
            showConfirm(
                'Vaciar Carrito',
                '¿Estás seguro? Se eliminarán todos los productos del carrito.',
                '🗑️',
                () => {
                    Object.values(carrito).forEach(item => {
                        let p = productos.find(x => x.id === item.id);
                        if (p) p.stock += item.cantidad;
                    });
                    carrito = {};
                    renderCart();
                    filtrar();
                }
            );
        }

        function cambiarCantidad(id, val) {
            let nuevaCant = parseInt(val);
            if (isNaN(nuevaCant) || nuevaCant < 1) nuevaCant = 1;

            let diff = nuevaCant - carrito[id].cantidad;
            let prodOriginal = productos.find(p => p.id === id);

            if (prodOriginal.stock < diff) {
                showAlert('Stock Insuficiente', 'No hay suficientes unidades disponibles de este producto.', '⚠️');
                renderCart();
                return;
            }

            prodOriginal.stock -= diff;
            carrito[id].cantidad = nuevaCant;
            renderCart();
            filtrar();
        }

        function renderCart() {
            const cont = document.getElementById("cart-items");
            cont.innerHTML = "";
            let total = 0, count = 0;

            Object.values(carrito).forEach(p => {
                let precio = p.oferta || p.precio;
                let subtotal = precio * p.cantidad;
                total += subtotal;
                count += p.cantidad;

                cont.innerHTML += `
        <div class="cart-item">
            <div style="display:flex; justify-content:space-between; align-items:start;">
                <b>${p.nombre}</b>
                <button onclick="eliminar(${p.id})" style="width:auto; padding:2px 8px; background:#ff4757; color:white; border:none; border-radius:4px; font-size:11px; cursor:pointer;">X</button>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:8px;">
                <input type="number" value="${p.cantidad}" min="1" onchange="cambiarCantidad(${p.id}, this.value)">
                <span style="font-weight:600; color:var(--primary);">Gs ${subtotal.toLocaleString('es-PY')}</span>
            </div>
        </div>`;
            });

            document.getElementById("total").innerText = "Total: Gs " + total.toLocaleString('es-PY');
            document.getElementById("count").innerText = count;

            // Guardar en LocalStorage
            localStorage.setItem('mv_carrito', JSON.stringify(carrito));

            // Actualizar badge móvil
            const badge = document.getElementById('mobile-badge');
            if (badge) {
                if (count > 0) {
                    badge.innerText = count > 99 ? '99+' : count;
                    badge.style.display = 'flex';
                } else {
                    badge.style.display = 'none';
                }
            }
        }

        // INTEGRACIÓN WHATSAPP
        function enviarWhatsApp() {
            let numero = "595976524960"

            // Validación: Carrito vacío
            if (Object.keys(carrito).length === 0) {
                showAlert('Carrito Vacío', 'Agrega productos a tu carrito antes de confirmar el pedido.', '🛒');
                return;
            }

            // Validación: Nombre requerido
            let cliente = document.getElementById('cliente').value.trim();
            if (!cliente) {
                document.getElementById('cliente').style.borderColor = '#ff4757';
                document.getElementById('cliente').style.boxShadow = '0 0 10px rgba(255,71,87,0.3)';
                showAlert('Nombre Requerido', 'Por favor, escribe tu nombre para que podamos identificar tu pedido.', '👤');
                return;
            }
            document.getElementById('cliente').style.borderColor = '';
            document.getElementById('cliente').style.boxShadow = '';

            // Bug Fix: línea divisora correcta y saltos de línea formateados
            let mensaje = "*🏪 PEDIDO - MV Comercial*%0A━━━━━━━━━━━━━━━━━━━━%0A%0A";
            let total = 0;

            Object.values(carrito).forEach(p => {
                let precio = p.oferta || p.precio;
                let subtotal = precio * p.cantidad;
                total += subtotal;
                mensaje += "✅ *" + p.nombre + "*%0A   Cant: " + p.cantidad + " x Gs " + precio.toLocaleString('es-PY') + " = *Gs " + subtotal.toLocaleString('es-PY') + "*%0A%0A";
            });

            mensaje += "━━━━━━━━━━━━━━━━━━━━%0A💰 *TOTAL A PAGAR: Gs " + total.toLocaleString('es-PY') + "*%0A━━━━━━━━━━━━━━━━━━━━%0A";
            mensaje += "%0A👤 *Cliente:* " + cliente;

            let nota = document.getElementById('nota').value.trim();
            if (nota) mensaje += "%0A📝 *Nota:* " + nota;

            let url = "https://wa.me/" + numero + "?text=" + mensaje;
            window.open(url, "_blank");

            // Preguntar si desea vaciar el carrito
            setTimeout(() => {
                showConfirm(
                    '¿Pedido enviado?',
                    '¿Deseas vaciar el carrito para iniciar un nuevo pedido?',
                    '🎉',
                    () => {
                        carrito = {};
                        renderCart();
                        filtrar();
                        document.getElementById('cliente').value = '';
                        document.getElementById('nota').value = '';
                    }
                );
            }, 800);
        }

        // NOTIFICACIÓN TOAST
        function toast() {
            let t = document.getElementById('toast');
            t.style.display = 'block';
            t.style.animation = 'fadeInDown 0.3s ease-out';
            if (t.timeoutId) clearTimeout(t.timeoutId);
            t.timeoutId = setTimeout(() => { t.style.display = 'none'; }, 2500);
        }

        // ─── SISTEMA DE MODAL CYBER-FRESH ───
        function showModal(icon, title, msg, actions) {
            document.getElementById('modal-icon').innerText = icon;
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-msg').innerText = msg;
            const actionsEl = document.getElementById('modal-actions');
            actionsEl.innerHTML = '';
            actions.forEach(a => {
                const btn = document.createElement('button');
                btn.className = 'modal-btn ' + (a.class || 'secondary');
                btn.innerText = a.label;
                btn.onclick = () => {
                    document.getElementById('modal-overlay').style.display = 'none';
                    if (a.cb) a.cb();
                };
                actionsEl.appendChild(btn);
            });
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function showAlert(title, msg, icon = '⚠️') {
            showModal(icon, title, msg, [{ label: 'Entendido', class: 'primary' }]);
        }

        function showConfirm(title, msg, icon = '❓', onConfirm) {
            showModal(icon, title, msg, [
                { label: 'Cancelar', class: 'secondary' },
                { label: 'Confirmar', class: 'danger', cb: onConfirm }
            ]);
        }
    </script>

</body>

</html>
